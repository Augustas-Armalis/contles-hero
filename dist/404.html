<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contles</title>
    <script>
      // GitHub Pages SPA redirect:
      // Save the full path so index.html can restore it after the app loads.
      sessionStorage.setItem(
        'gh_pages_redirect',
        location.pathname + location.search + location.hash
      );
      location.replace('/');
    </script>
  </head>
  <body></body>
</html>
